{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block auth_content %}
<div style="min-height:100vh;background:var(--cs-dark);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <div class="glass-card p-4">
      <h5 class="fw-bold mb-1">Set New Password</h5>
      <p style="font-size:.8rem;color:#94a3b8;" class="mb-3">Choose a strong password for your account</p>
      {% if messages %}{% for msg in messages %}<div class="alert alert-{{ msg.tags }} py-2">{{ msg }}</div>{% endfor %}{% endif %}
      <form method="post" class="cs-form">
        {% csrf_token %}
        <div class="mb-3"><label>New Password</label><input type="password" name="new_password" class="form-control" required minlength="8"></div>
        <div class="mb-3"><label>Confirm Password</label><input type="password" name="confirm_password" class="form-control" required></div>
        <button type="submit" class="btn btn-cs-primary w-100 py-2"><i class="fas fa-key me-2"></i>Reset Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
