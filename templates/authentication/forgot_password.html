{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block auth_content %}
<div style="min-height:100vh;background:var(--cs-dark);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="width:100%;max-width:420px;">
    <div class="glass-card p-4">
      <h5 class="fw-bold mb-1">Reset Password</h5>
      <p style="font-size:.8rem;color:#94a3b8;" class="mb-3">Enter your email to receive a reset OTP</p>
      {% if messages %}{% for msg in messages %}<div class="alert alert-{{ msg.tags }} py-2">{{ msg }}</div>{% endfor %}{% endif %}
      <form method="post" class="cs-form">
        {% csrf_token %}
        <div class="mb-3"><label>Email Address</label><input type="email" name="email" class="form-control" placeholder="your@email.com" required></div>
        <button type="submit" class="btn btn-cs-primary w-100 py-2"><i class="fas fa-paper-plane me-2"></i>Send Reset OTP</button>
      </form>
      <div class="text-center mt-3"><a href="{% url 'authentication:login' %}" style="font-size:.8rem;color:#00d4ff;text-decoration:none;"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></div>
    </div>
  </div>
</div>
{% endblock %}
